<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aashi ❤️</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

.card{
background:rgba(255,255,255,.95);
padding:30px;
border-radius:20px;
max-width:360px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
animation:fadeIn 1.2s;
}

h1{
color:#e91e63;
}

p{
font-size:18px;
line-height:1.7;
color:#444;
}

button{
background:#e91e63;
color:white;
border:none;
padding:12px 25px;
border-radius:30px;
font-size:17px;
cursor:pointer;
}

.heart{
position:absolute;
font-size:22px;
animation:float 6s linear infinite;
opacity:.8;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120px);}
}

@keyframes fadeIn{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}
</style>
</head>

<body>

<div class="card">
<h1>🌹 Good Morning, Aashi Ji ❤️</h1>

<p>
Every morning feels a little brighter knowing wonderful people like you exist. ☀️❤️<br><br>

May your day be filled with smiles, peace, happiness, and beautiful moments.<br><br>

✨ Wishing you a truly amazing day! ✨
</p>

<button onclick="showMessage()">💖 Tap Here</button>
</div>

<script>
function showMessage(){
alert("🌹 Just wanted to make you smile. Have a beautiful day, Aashi Ji! ❤️");
}

for(let i=0;i<25;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*4)+"s";
h.style.fontSize=(16+Math.random()*20)+"px";
document.body.appendChild(h);
}
</script>

</body>
</html>
